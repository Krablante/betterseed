    <path d="M254 145c-44 18-76 58-76 102 0 43 29 78 69 93 39-15 68-50 68-93 0-44-32-84-76-102z" fill="url(#seed)"/>
    <path d="M248 169c-7 33-4 74 24 116" fill="none" stroke="#fff7ed" stroke-width="10" stroke-linecap="round"/>
    <circle cx="215" cy="206" r="10" fill="#fff7ed" opacity="0.9"/>
    <circle cx="282" cy="244" r="8" fill="#fff7ed" opacity="0.75"/>
  </g>
  <text x="430" y="198" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="88" font-weight="700" letter-spacing="1.2">BetterSeed</text>
  <text x="430" y="254" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="30" font-weight="500" letter-spacing="0.3">A curated public release line for the Snapseed mod</text>
  <text x="430" y="300" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="400">Release-oriented. Verified. Lightweight.</text>
