<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" width="1600" height="480">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050709" />
      <stop offset="40%" stop-color="#0D1117" />
      <stop offset="100%" stop-color="#0A0D12" />
    </linearGradient>

    <!-- Glowing Accents -->
    <radialGradient id="glow-left" cx="0%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#00E676" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-right" cx="75%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0" />
    </radialGradient>

    <!-- Text & Stroke Gradients -->
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E676" />
      <stop offset="100%" stop-color="#00BFA5" />
    </linearGradient>
    <linearGradient id="curve-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E676" />
      <stop offset="50%" stop-color="#14B8A6" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>

    <!-- Seed Fills -->
    <linearGradient id="seed-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00BFA5" stop-opacity="0.0" />
    </linearGradient>

    <!-- Histogram Fill -->
    <linearGradient id="hist-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.0" />
    </linearGradient>

    <!-- Glass Panel Fill -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.01" />
    </linearGradient>

    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-subtle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Background Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1" />
    </pattern>
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FFFFFF" opacity="0.04" />
    </pattern>

    <style>
      .font-sans { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
      .font-mono { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace; text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
      .text-shadow { text-shadow: 0px 4px 16px rgba(0,0,0,0.4); }
    </style>
  </defs>

  <!-- Base Canvas -->
  <rect width="1600" height="480" rx="32" fill="url(#bg-grad)" />
  <rect width="1600" height="480" rx="32" fill="url(#grid)" />
  <rect width="1600" height="480" rx="32" fill="url(#dot-grid)" />

  <!-- Ambient Glows -->
  <circle cx="0" cy="240" r="600" fill="url(#glow-left)" />
  <circle cx="1200" cy="240" r="500" fill="url(#glow-right)" />

  <!-- Background Technical Blueprint Nodes -->
  <g opacity="0.4">
    <path d="M -50 380 L 150 380 L 220 310" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 4" />
    <circle cx="150" cy="380" r="4" fill="#0D1117" stroke="#374151" stroke-width="1.5" />
    <circle cx="220" cy="310" r="4" fill="#0D1117" stroke="#374151" stroke-width="1.5" />
    <path d="M 1400 60 L 1480 60 L 1520 100" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 4" />
  </g>

  <!-- ========================================== -->
  <!-- RIGHT SIDE: ABSTRACT SEED & EDITING SYSTEM -->
  <!-- ========================================== -->
  <g id="right-graphic" transform="translate(0, 0)">
    
    <!-- Glass Panel Base -->
    <rect x="900" y="60" width="600" height="360" rx="24" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1.5" />
    <rect x="901" y="61" width="598" height="358" rx="23" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />
    
    <!-- Panel Top UI Bar -->
    <path d="M 900 110 L 1500 110" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1.5" />
    <circle cx="930" cy="85" r="5" fill="#FFFFFF" opacity="0.1" />
    <circle cx="950" cy="85" r="5" fill="#FFFFFF" opacity="0.1" />
    <circle cx="970" cy="85" r="5" fill="#FFFFFF" opacity="0.1" />
    <text x="1000" y="89" class="font-mono" font-size="10" font-weight="600" fill="#FFFFFF" opacity="0.3" letter-spacing="2">ADJUSTMENTS // SEED.CORE</text>

    <!-- Subdued Histogram -->
    <path d="M 900 420 L 930 380 L 970 395 L 1020 310 L 1080 340 L 1150 250 L 1210 280 L 1280 190 L 1340 250 L 1410 170 L 1460 220 L 1500 190 L 1500 420 Z" fill="url(#hist-grad)" />

    <!-- 1. Central Engineered Seed Motif -->
    <g transform="translate(0, -10)">
      <!-- Base Glowing Seed (Main Green) -->
      <path d="M 1070 120 Q 1330 120, 1330 380 Q 1070 380, 1070 120 Z" fill="url(#seed-fill)" stroke="url(#green-grad)" stroke-width="2" filter="url(#glow-subtle)" />
      <!-- Wireframe Mesh Rings (Topographic Structure) -->
      <path d="M 1110 160 Q 1290 160, 1290 340 Q 1110 340, 1110 160 Z" fill="none" stroke="#00E676" stroke-width="1.5" stroke-opacity="0.4" />
      <path d="M 1150 200 Q 1250 200, 1250 300 Q 1150 300, 1150 200 Z" fill="none" stroke="#00E676" stroke-width="1.5" stroke-opacity="0.2" />
      
      <!-- Opposing Seed Layer (Teal, Dashed) -->
      <path d="M 1070 380 Q 1070 120, 1330 120 Q 1330 380, 1070 380 Z" fill="none" stroke="#14B8A6" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.6" />
      <path d="M 1110 340 Q 1110 160, 1290 160 Q 1290 340, 1110 340 Z" fill="none" stroke="#14B8A6" stroke-width="1" stroke-dasharray="4 4" opacity="0.3" />
    </g>

    <!-- Technical Crop/Frame Marks -->
    <g stroke="#2DD4BF" stroke-width="2" fill="none" opacity="0.8">
      <!-- Top Left -->
      <path d="M 1040 160 L 1020 160 L 1020 180" />
      <!-- Top Right -->
      <path d="M 1360 160 L 1380 160 L 1380 180" />
      <!-- Bottom Left -->
      <path d="M 1020 320 L 1020 340 L 1040 340" />
      <!-- Bottom Right -->
      <path d="M 1380 320 L 1380 340 L 1360 340" />
    </g>

    <!-- 2. UI Sliders & Adjustment Elements -->
    <g transform="translate(1360, 290)">
      <!-- Slider 1 -->
      <line x1="0" y1="0" x2="110" y2="0" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="4" stroke-linecap="round" />
      <line x1="0" y1="0" x2="60" y2="0" stroke="url(#green-grad)" stroke-width="4" stroke-linecap="round" />
      <circle cx="60" cy="0" r="7" fill="#FFFFFF" />
      <!-- Slider 2 -->
      <line x1="0" y1="30" x2="110" y2="30" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="4" stroke-linecap="round" />
      <line x1="0" y1="30" x2="85" y2="30" stroke="url(#curve-grad)" stroke-width="4" stroke-linecap="round" />
      <circle cx="85" cy="30" r="7" fill="#FFFFFF" />
      <!-- Slider 3 -->
      <line x1="0" y1="60" x2="110" y2="60" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="4" stroke-linecap="round" />
      <line x1="0" y1="60" x2="40" y2="60" stroke="#14B8A6" stroke-width="4" stroke-linecap="round" />
      <circle cx="40" cy="60" r="7" fill="#FFFFFF" />
    </g>

    <!-- 3. Dynamic Tone Curve (The Hero Line) -->
    <!-- Grid context lines for the curve -->
    <line x1="900" y1="250" x2="1500" y2="250" stroke="#FFFFFF" stroke-opacity="0.05" stroke-dasharray="4 4" stroke-width="1" />
    <line x1="1200" y1="110" x2="1200" y2="420" stroke="#FFFFFF" stroke-opacity="0.05" stroke-dasharray="4 4" stroke-width="1" />
    
    <!-- Outer Glow Line -->
    <path d="M 900 360 Q 1100 360, 1200 250 T 1500 140" fill="none" stroke="url(#curve-grad)" stroke-width="4" filter="url(#glow)" />
    <!-- Core Sharp Line -->
    <path d="M 900 360 Q 1100 360, 1200 250 T 1500 140" fill="none" stroke="#FFFFFF" stroke-width="2" />
    
    <!-- Connecting Axis Lines to Center Node -->
    <line x1="1200" y1="250" x2="1200" y2="420" stroke="#F59E0B" stroke-opacity="0.4" stroke-dasharray="4 4" stroke-width="1.5" />
    <line x1="900" y1="250" x2="1200" y2="250" stroke="#F59E0B" stroke-opacity="0.4" stroke-dasharray="4 4" stroke-width="1.5" />

    <!-- Adjustment Nodes -->
    <!-- Node 1 -->
    <circle cx="1050" cy="305" r="5" fill="#0D1117" stroke="#00E676" stroke-width="2.5" />
    <!-- Node 2 (Center Active Highlight - Subtle Warm Amber) -->
    <circle cx="1200" cy="250" r="7" fill="#F59E0B" stroke="#FFFFFF" stroke-width="2.5" filter="url(#glow-subtle)" />
    <!-- Node 3 -->
    <circle cx="1350" cy="195" r="5" fill="#0D1117" stroke="#2DD4BF" stroke-width="2.5" />
  </g>

  <!-- ========================================== -->
  <!-- LEFT SIDE: TYPOGRAPHY & BRANDING           -->
  <!-- ========================================== -->
  
  <!-- Release Badge -->
  <g transform="translate(120, 100)">
    <rect x="0" y="0" width="124" height="32" rx="16" fill="#00E676" fill-opacity="0.1" stroke="#00E676" stroke-opacity="0.3" stroke-width="1" />
    <circle cx="16" cy="16" r="4" fill="#00E676" filter="url(#glow-subtle)" />
    <text x="32" y="21" class="font-mono" font-size="12" font-weight="700" fill="#00E676" letter-spacing="1">MOD.RELEASE</text>
  </g>

  <!-- Main Title -->
  <text x="120" y="205" class="font-sans text-shadow" font-size="84" font-weight="900" fill="#FFFFFF" letter-spacing="-2">
    Better<tspan fill="url(#green-grad)">Seed</tspan>
  </text>

  <!-- Tagline -->
  <text x="120" y="260" class="font-sans" font-size="28" font-weight="500" fill="#9CA3AF" letter-spacing="-0.5">
    Editable projects <tspan fill="#14B8A6" opacity="0.6">✦</tspan> Stable exports <tspan fill="#14B8A6" opacity="0.6">✦</tspan> Better control
  </text>

  <!-- Feature List / Metadata block -->
  <g transform="translate(120, 315)" class="font-mono" font-size="13" font-weight="500" fill="#6B7280" letter-spacing="0.5">
    <!-- Item 1 -->
    <rect x="0" y="-10" width="4" height="4" fill="#00E676" opacity="0.7" />
    <text x="16" y="-5">NON-DESTRUCTIVE WORKFLOW</text>
    <!-- Item 2 -->
    <rect x="0" y="20" width="4" height="4" fill="#14B8A6" opacity="0.7" />
    <text x="16" y="25">ENHANCED ADJUSTMENT LAYERS</text>
    <!-- Item 3 -->
    <rect x="0" y="50" width="4" height="4" fill="#2DD4BF" opacity="0.7" />
    <text x="16" y="55">PERSISTENT PROJECT SAVES</text>
  </g>

  <!-- System Status / Export Node visually stabilizing the layout -->
  <g transform="translate(120, 420)">
    <rect x="0" y="0" width="220" height="4" rx="2" fill="#374151" fill-opacity="0.5" />
    <rect x="0" y="0" width="160" height="4" rx="2" fill="url(#green-grad)" />
    <circle cx="160" cy="2" r="4" fill="#FFFFFF" filter="url(#glow-subtle)" />
    <text x="0" y="22" class="font-mono" font-size="10" font-weight="600" fill="#6B7280" letter-spacing="1">STATUS: STABLE_BUILD // EXPORT_READY</text>
  </g>

</svg>
